# examples/git-cdn-pat-secret.yaml
# ---------------------------------------------------------------------------
# 集群里给 git-cdn / pod-template 用的 PAT secret 模板
#
# git-cdn 强制要 BasicAuth 头（即便拉公开仓库也一样）。有两条路：
#
#   A) 共享 PAT（推荐日常 CI 用法）
#      - Vault 里存一个组织级、只读 public repos 的 PAT
#      - 通过既有的 vault → Kubernetes Secret 同步机制（参考仓库里 vault.yaml 的用法）
#      - Pod-template 里读这个 Secret 拼 gitconfig（见 pod-template-init-snippet.yaml）
#
#   B) 用 runner 自身 GITHUB_TOKEN
#      - 每个 CI job 里 GITHUB_TOKEN env 已由 actions-runner 注入
#      - Pod-template 的 postStart 里直接 ${GITHUB_TOKEN} 拼 gitconfig
#      - 优势：不新增 secret，权限精确；劣势：token 短命，且 job 启动前不可用
#
# 两种都不需要改 git-cdn 本身；差别只在 pod-template 怎么拼 URL.
# ---------------------------------------------------------------------------

# 模式 A 示例 —— 从 Vault 同步一个共享 PAT
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: git-cdn-pat
  # 注意：这里应该放到 CI 运行的 namespace（例如 ascend-gha-runners, sglang-npu-sglang 等）
  # 而不是 git-cdn 所在 ns —— 因为消费方是 runner 的 pod-template，不是 git-cdn 本体
  namespace: ascend-gha-runners
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: git-cdn-pat
    creationPolicy: Owner
  data:
    - secretKey: token
      remoteRef:
        # Vault path 建议放到共享位置，多个 runner ns 都可以引用
        key: shared/github/git-cdn-readonly-pat
        property: token
---
# 模式 A 的替代：如果集群里没跑 external-secrets，直接手工创建（不推荐生产用）
# kubectl -n ascend-gha-runners create secret generic git-cdn-pat --from-literal=token=ghp_xxxx
#
# apiVersion: v1
# kind: Secret
# metadata:
#   name: git-cdn-pat
#   namespace: ascend-gha-runners
# type: Opaque
# stringData:
#   token: "REPLACE_WITH_ORG_LEVEL_READONLY_PAT"
